<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARK-iN</title>
    <link rel="icon" href="img/Untitled_design-removebg-preview.png" type="png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- configure php later on to make it fully functional -->
    <section id="register-sect" class="register-sect">
        <div class="container">
            <fieldset>
                <h1>Register</h1>
                <form action="register.php" method="post">
                    <input type="tel" name="phonenum" id="phonenum" placeholder="Enter your phone number">
                    <input type="text" name="platnum" id="platnum" placeholder="Enter your plat number">
                    <!-- <br><br> -->
                    <input type="email" name="email" id="email" placeholder="Enter your email">
                    <input type="text" name="username" id="username" placeholder="Create username">
                    <input type="password" name="password" id="password" pattern=".{8,}" placeholder="Create password" required>
                    <label for="checkbox"><input type="checkbox" name="checkbox" id="checkbox">Show Password</label>
                    <input type="submit" value="Sign Up">
                </form>
                <p>Already have an account? <a href="login.html"><br>Click Here</a></p>
            </fieldset>
        </div>
    </section>
    <script src="script/script.js"></script>
</body>
</html>
